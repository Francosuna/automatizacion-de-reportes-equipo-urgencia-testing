<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin — QA Reporter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Epilogue:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #07080A; --surface: #0E1117; --surface2: #131620;
      --border: #1C2030; --border2: #252A3D;
      --text: #E4E7F0; --muted: #5A607A; --muted2: #7D849E;
      --accent: #5B7FFF; --accent-dim: #0D1140; --accent-border: #1E2E8F;
      --red: #F25757; --red-dim: #2A1010; --red-border: #5C1D1D;
    }
    body {
      font-family: "Epilogue", sans-serif;
      background: var(--bg);
      background-image: radial-gradient(circle, #1C2030 1px, transparent 1px);
      background-size: 28px 28px;
      color: var(--text); min-height: 100vh;
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 40px 36px; width: 100%; max-width: 380px;
      border-top: 2px solid var(--accent); animation: fadeUp .35s ease;
    }
    .eyebrow {
      font-size: 10px; font-weight: 700; letter-spacing: .18em;
      text-transform: uppercase; color: var(--accent);
      margin-bottom: 8px; display: flex; align-items: center; gap: 8px;
    }
    .eyebrow::before {
      content: ""; width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent); box-shadow: 0 0 8px var(--accent);
    }
    h1 { font-family: "Syne", sans-serif; font-size: 24px; font-weight: 800; margin-bottom: 28px; }
    label {
      display: block; font-size: 10px; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: .08em; margin-bottom: 6px;
    }
    input[type="password"] {
      font-family: "JetBrains Mono", monospace; font-size: 13px; color: var(--text);
      background: var(--bg); border: 1px solid var(--border2); border-radius: 8px;
      padding: 10px 12px; width: 100%; outline: none; transition: border-color .15s;
    }
    input[type="password"]:focus { border-color: var(--accent); }
    input[type="password"]::placeholder { color: var(--muted); font-family: "Epilogue", sans-serif; }
    .error {
      font-size: 12px; color: var(--red); background: var(--red-dim);
      border: 1px solid var(--red-border); border-radius: 8px;
      padding: 8px 12px; margin-bottom: 16px;
    }
    .btn {
      font-family: "Syne", sans-serif; font-size: 14px; font-weight: 700;
      padding: 12px; border-radius: 8px; border: none;
      background: var(--accent); color: var(--bg); width: 100%;
      cursor: pointer; margin-top: 16px;
      transition: opacity .15s, box-shadow .2s;
      box-shadow: 0 0 20px rgba(91,127,255,.22);
    }
    .btn:hover { opacity: .9; box-shadow: 0 0 30px rgba(91,127,255,.35); }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="eyebrow">QA Reporter</div>
    <h1>Panel de admin</h1>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="POST">
      <label for="password">Contraseña</label>
      <input type="password" id="password" name="password" autofocus placeholder="••••••••">
      <button class="btn" type="submit">Ingresar</button>
    </form>
  </div>
</body>
</html>
